<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ELECTIONS BY EQUIP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      /* Premium deep navy background with a subtle radial depth */
      background: radial-gradient(circle at center, #122c47 0%, #0d2136 70%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      color: #ffffff;
      overflow: hidden; /* Prevents scrollbars during animation */
    }

    /* Loader Container */
    .loader-container {
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease-out forwards;
      padding: 2rem;
    }

    /* Logo Area */
    .logo-container {
      position: relative;
      width: 400px;
      height: 400px;
      margin: 0 auto 2.5rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .brand-logo {
      max-width: 100%;
      max-height: 100%;
      position: relative;
      z-index: 2;
      /* Gives the logo a premium golden glow */
      filter: drop-shadow(0 0 20px rgba(168, 147, 90, 0.5));
      animation: float 4s ease-in-out infinite;
    }

   

    /* Brand Name */
    .brand-name {
      color: #a8935a;
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      text-indent: 0.4em; /* Offsets letter-spacing to keep it perfectly centered */
      margin-bottom: 3rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }

    /* Progress Bar */
    .progress-track {
      width: 200px;
      height: 2px;
      background: rgba(255, 255, 255, 0.1);
      margin: 0 auto;
      border-radius: 1px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #a8935a, #d4b872);
      box-shadow: 0 0 10px rgba(168, 147, 90, 0.8);
      animation: fillProgress 3s linear forwards;
    }

    /* Status Text */
    .status {
      color: rgba(255, 255, 255, 0.4);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-top: 1.5rem;
    }

    /* Animations */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    @keyframes fillProgress {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    /* Exit Animation */
    .fade-out {
      animation: fadeOut 0.6s ease-in forwards;
    }

    @keyframes fadeOut {
      to { opacity: 0; visibility: hidden; }
    }

    /* Responsive adjustments for very short screens */
    @media (max-height: 600px) {
      .logo-container { width: 80px; height: 80px; margin-bottom: 1.5rem; }
      .brand-name { font-size: 1.2rem; margin-bottom: 2rem; }
    }
  </style>
</head>
<body>

  <!-- Premium Loading Screen -->
  <div class="loader-container" id="loader">
    <div class="logo-container">
      <img src="data/eGold.png" alt="ELECTIONS BY EQUIP" class="brand-logo">
      <div class="logo-glow"></div>
    </div>
    <h1 class="brand-name">ELECTIONS BY EQUIP</h1>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <p class="status">Preparing your experience</p>
  </div>

  <script>
    // Invisible Device Detection Logic
    function detectDevice() {
      const ua = navigator.userAgent;
      // Check for explicit mobile phone user agents
      const isMobileUA = /Android|webOS|iPhone|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
      // Check for explicit tablet user agents (to exclude them from mobile)
      const isTabletUA = /iPad|Android(?!.*Mobile)/i.test(ua);
      // Check screen width
      const width = window.innerWidth;
      
      // If it's a mobile phone UA (and not a tablet), or if the screen is small (<= 768px)
      if ((isMobileUA && !isTabletUA) || width <= 768) {
        return 'mobile.html';
      }
      
      // Otherwise, it's a tablet or desktop
      return 'desktop.html';
    }

    // Execute redirection after exactly 3 seconds
    setTimeout(() => {
      const loader = document.getElementById('loader');
      
      // Trigger smooth exit animation
      loader.classList.add('fade-out');
      
      // Redirect after the fade-out animation completes (0.6s)
      setTimeout(() => {
        const target = detectDevice();
        // Use replace so the user doesn't get stuck in a back-button loop
        window.location.replace(target);
      }, 600);
      
    }, 10000);
  </script>
</body>
</html>
